spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mariadb://localhost:3306/external_db
    username: ${EXTERNAL_DB_USERNAME:external_user}
    password: ${EXTERNAL_DB_PASSWORD:external_pass}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
