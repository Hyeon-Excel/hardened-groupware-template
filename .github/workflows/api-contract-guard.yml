name: API Contract Guard

on:
  pull_request:
    paths:
      - "docs/api/API.md"
      - "docs/api/openapi.yaml"
      - "docs/reports/API_CONTRACT_SYNC_CHECKLIST.md"
      - "scripts/check_api_contract_drift.py"
      - ".github/workflows/api-contract-guard.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "docs/api/API.md"
      - "docs/api/openapi.yaml"
      - "docs/reports/API_CONTRACT_SYNC_CHECKLIST.md"
      - "scripts/check_api_contract_drift.py"
      - ".github/workflows/api-contract-guard.yml"

jobs:
  openapi-lint:
    name: OpenAPI Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint OpenAPI spec
        run: npx --yes @redocly/cli@latest lint docs/api/openapi.yaml

  api-contract-drift:
    name: API Drift Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check API contract drift
        run: python scripts/check_api_contract_drift.py --api-md docs/api/API.md --openapi docs/api/openapi.yaml
