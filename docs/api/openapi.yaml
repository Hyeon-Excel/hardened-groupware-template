components:
  securitySchemes:
    ExternalSessionAuth:
      type: apiKey
      in: cookie
      name: JSESSIONID
      description: External API session cookie

    InternalSessionAuth:
      type: apiKey
      in: cookie
      name: JSESSIONID
      description: Internal API session cookie

    CsrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-TOKEN
      description: Required for POST/PUT/PATCH/DELETE with session auth

    ServiceTokenAuth:
      type: apiKey
      in: header
      name: X-Service-Token
      description: Internal service-to-service auth token

  parameters:
    PageParam:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1

    SizeParam:
      in: query
      name: size
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10

    SortParam:
      in: query
      name: sort
      schema:
        type: string
        example: createdAt,desc

    KeywordParam:
      in: query
      name: keyword
      schema:
        type: string

    NewsIdParam:
      in: path
      name: newsId
      required: true
      schema:
        type: integer
        format: int64

    NoticeIdParam:
      in: path
      name: noticeId
      required: true
      schema:
        type: integer
        format: int64

    ResourceIdParam:
      in: path
      name: resourceId
      required: true
      schema:
        type: integer
        format: int64

    TicketIdParam:
      in: path
      name: ticketId
      required: true
      schema:
        type: integer
        format: int64

    EmployeeIdParam:
      in: path
      name: employeeId
      required: true
      schema:
        type: integer
        format: int64

    ApprovalIdParam:
      in: path
      name: approvalId
      required: true
      schema:
        type: integer
        format: int64

    CareerIdParam:
      in: path
      name: careerId
      required: true
      schema:
        type: integer
        format: int64

    FileIdParam:
      in: path
      name: fileId
      required: true
      schema:
        type: integer
        format: int64

    ApplicationIdParam:
      in: path
      name: applicationId
      required: true
      schema:
        type: integer
        format: int64

    UserIdParam:
      in: path
      name: userId
      required: true
      schema:
        type: integer
        format: int64

  responses:
    BadRequestResponse:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    UnauthorizedResponse:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    ForbiddenResponse:
      description: 권한 부족
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFoundResponse:
      description: 대상 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    ConflictResponse:
      description: 충돌
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    RateLimitResponse:
      description: 호출 횟수 제한 초과
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ApiResponseBase:
      type: object
      required: [success, code, message, timestamp]
      properties:
        success:
          type: boolean
        code:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    ApiResponseVoid:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: "null"

    ErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: "null"

    CsrfTokenResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              type: object
              required: [csrfToken]
              properties:
                csrfToken:
                  type: string

    LoginRequest:
      type: object
      required: [loginId, password]
      properties:
        loginId:
          type: string
        password:
          type: string
          format: password

    ExternalSignupRequest:
      type: object
      required: [loginId, password, email, name]
      properties:
        loginId:
          type: string
        password:
          type: string
          format: password
        email:
          type: string
          format: email
        name:
          type: string

    PasswordResetRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    PasswordResetConfirmRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string
          format: password

    ExternalSessionResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ExternalUserSession"

    InternalSessionResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseBase"
        - type: object
