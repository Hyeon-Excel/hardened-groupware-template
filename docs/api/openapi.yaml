openapi: 3.1.0
info:
  title: hardened-groupware-template API
  version: 0.1.0
  license:
    name: UNLICENSED
    url: https://example.org/licenses/unlicensed
  summary: External / Internal / External Internal API contract
  description: |
    hardened-groupware-template의 API 명세 초안.
    - External User API
    - Internal Groupware API
    - External Admin Internal API
    - Session/Cookie auth + CSRF
    - File security state flow

servers:
  - url: https://external-api.hgt.local
    description: External API base URL
  - url: https://internal-api.hgt.local
    description: Internal API base URL

security: []

tags:
  - name: External Auth
    description: 공개 사용자 인증 관련 API
  - name: External CSRF
    description: 공개 서비스 CSRF 토큰 API
  - name: External News
    description: 공개 뉴스 조회 API
  - name: External Notices
    description: 공개 공지 조회 API
  - name: External Resources
    description: 공개 자료 조회/다운로드 API
  - name: External Support
    description: 공개 고객 문의 API
  - name: External Me
    description: 공개 사용자 마이페이지 API
  - name: External Careers
    description: 공개 채용 및 지원 API
  - name: External Files
    description: 공개 서비스 파일 상태 조회 API
  - name: Internal Auth
    description: 내부 사용자 인증 API
  - name: Internal CSRF
    description: 내부 서비스 CSRF 토큰 API
  - name: Internal Notices
    description: 내부 공지 API
  - name: Internal Employees
    description: 내부 사원 디렉토리 API
  - name: Internal Approvals
    description: 내부 전자결재 API
  - name: Internal Applicants
    description: 내부 지원자 검토 API
  - name: Internal Support
    description: 내부 고객 문의 처리 API
  - name: Internal Admin
    description: 내부 관리자 운영 API
  - name: Internal Files
    description: 내부 서비스 파일 상태 조회 API
  - name: External Internal Admin
    description: internal-api가 호출하는 external-api 내부 관리 API

paths:
  /api/external/csrf:
    get:
      tags: [External CSRF]
      summary: 공개 서비스 CSRF 토큰 발급
      operationId: getExternalCsrfToken
      responses:
        "200":
          description: CSRF 토큰 발급 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsrfTokenResponse"

        "400":
          $ref: "#/components/responses/BadRequestResponse"
  /api/external/auth/signup:
    post:
      tags: [External Auth]
      summary: 일반 사용자 회원가입
      operationId: externalSignup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExternalSignupRequest"
      responses:
        "201":
          description: 회원가입 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "409":
          $ref: "#/components/responses/ConflictResponse"

  /api/external/auth/login:
    post:
      tags: [External Auth]
      summary: 일반 사용자 로그인
      operationId: externalLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 로그인 성공
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Session cookie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalSessionResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "429":
          $ref: "#/components/responses/RateLimitResponse"

  /api/external/auth/logout:
    post:
      tags: [External Auth]
      summary: 일반 사용자 로그아웃
      operationId: externalLogout
      security:
        - ExternalSessionAuth: []
          CsrfHeader: []
      responses:
        "200":
          description: 로그아웃 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"

        "400":
          $ref: "#/components/responses/BadRequestResponse"
  /api/external/auth/password-reset/request:
    post:
      tags: [External Auth]
      summary: 공개 사용자 비밀번호 재설정 요청
      operationId: externalPasswordResetRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetRequest"
      responses:
        "202":
          description: 요청 접수
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"
        "429":
          $ref: "#/components/responses/RateLimitResponse"

  /api/external/auth/password-reset/confirm:
    post:
      tags: [External Auth]
      summary: 공개 사용자 비밀번호 재설정 확정
      operationId: externalPasswordResetConfirm
      security:
        - CsrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordResetConfirmRequest"
      responses:
        "200":
          description: 비밀번호 재설정 완료
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"

        "400":
          $ref: "#/components/responses/BadRequestResponse"
  /api/external/news:
    get:
      tags: [External News]
      summary: 공개 뉴스 목록 조회
      operationId: getExternalNewsList
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - $ref: "#/components/parameters/SortParam"
        - $ref: "#/components/parameters/KeywordParam"
      responses:
        "200":
          description: 뉴스 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalNewsListResponse"

        "400":
          $ref: "#/components/responses/BadRequestResponse"
  /api/external/news/{newsId}:
    get:
      tags: [External News]
      summary: 공개 뉴스 상세 조회
      operationId: getExternalNewsDetail
      parameters:
        - $ref: "#/components/parameters/NewsIdParam"
      responses:
        "200":
          description: 뉴스 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalNewsDetailResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"

  /api/external/notices:
    get:
      tags: [External Notices]
      summary: 공개 공지 목록 조회
      operationId: getExternalNotices
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - $ref: "#/components/parameters/SortParam"
        - $ref: "#/components/parameters/KeywordParam"
      responses:
        "200":
          description: 공지 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalNoticeListResponse"

        "400":
          $ref: "#/components/responses/BadRequestResponse"
  /api/external/notices/{noticeId}:
    get:
      tags: [External Notices]
      summary: 공개 공지 상세 조회
      operationId: getExternalNoticeDetail
      parameters:
        - $ref: "#/components/parameters/NoticeIdParam"
      responses:
        "200":
          description: 공지 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalNoticeDetailResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"

  /api/external/support-tickets:
    post:
      tags: [External Support]
      summary: 고객센터 문의 등록
      operationId: createSupportTicket
      security:
        - ExternalSessionAuth: []
          CsrfHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/SupportTicketCreateRequest"
      responses:
        "202":
          description: 문의 접수 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicketAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "429":
          $ref: "#/components/responses/RateLimitResponse"

  /api/external/support-tickets/me:
    get:
      tags: [External Support]
      summary: 내 문의 목록 조회
      operationId: getMySupportTickets
      security:
        - ExternalSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
      responses:
        "200":
          description: 문의 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalSupportTicketListResponse"

        "400":
          $ref: "#/components/responses/BadRequestResponse"
  /api/external/support-tickets/{ticketId}:
    get:
      tags: [External Support]
      summary: 내 문의 상세 조회
      operationId: getMySupportTicketDetail
      description: v0에서는 소유권 불일치 시 403 또는 404가 반환될 수 있으며, v1 운영 기준은 404를 반환해 리소스 존재 여부를 숨긴다.
      security:
        - ExternalSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/TicketIdParam"
      responses:
        "200":
          description: 문의 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalSupportTicketDetailResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"

  /api/external/resources:
    get:
      tags: [External Resources]
      summary: 공개 자료 목록 조회
      operationId: getExternalResources
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - $ref: "#/components/parameters/SortParam"
        - $ref: "#/components/parameters/KeywordParam"
      responses:
        "200":
          description: 자료 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalResourceListResponse"

        "400":
          $ref: "#/components/responses/BadRequestResponse"
  /api/external/resources/{resourceId}:
    get:
      tags: [External Resources]
      summary: 공개 자료 상세 조회
      operationId: getExternalResourceDetail
      parameters:
        - $ref: "#/components/parameters/ResourceIdParam"
      responses:
        "200":
          description: 자료 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalResourceDetailResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"

  /api/external/resources/{resourceId}/download:
    get:
      tags: [External Resources]
      summary: 공개 자료 다운로드
      operationId: downloadExternalResource
      parameters:
        - $ref: "#/components/parameters/ResourceIdParam"
      responses:
        "200":
          description: 자료 다운로드 성공
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/NotFoundResponse"

  /api/external/careers:
    get:
      tags: [External Careers]
      summary: 채용 공고 목록 조회
      operationId: getCareerPosts
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
      responses:
        "200":
          description: 채용 공고 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareerPostListResponse"

        "400":
          $ref: "#/components/responses/BadRequestResponse"
  /api/external/careers/{careerId}:
    get:
      tags: [External Careers]
      summary: 채용 공고 상세 조회
      operationId: getCareerPostDetail
      parameters:
        - $ref: "#/components/parameters/CareerIdParam"
      responses:
        "200":
          description: 채용 공고 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareerPostDetailResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"

  /api/external/careers/{careerId}/applications:
    post:
      tags: [External Careers]
      summary: 채용 공고 지원서 제출
      operationId: submitCareerApplication
      security:
        - ExternalSessionAuth: []
          CsrfHeader: []
      parameters:
        - $ref: "#/components/parameters/CareerIdParam"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CareerApplicationCreateRequest"
      responses:
        "202":
          description: 지원서 업로드 접수 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileAcceptedResponse"
        "429":
          $ref: "#/components/responses/RateLimitResponse"

  /api/external/careers/applications/me:
    get:
      tags: [External Careers]
      summary: 내 지원 내역 조회
      operationId: getMyCareerApplications
      security:
        - ExternalSessionAuth: []
      responses:
        "200":
          description: 지원 내역 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CareerApplicationListResponse"

        "400":
          $ref: "#/components/responses/BadRequestResponse"
  /api/external/files/{fileId}/status:
    get:
      tags: [External Files]
      summary: 공개 서비스 파일 상태 조회
      operationId: getExternalFileStatus
      description: v0에서는 소유권 불일치 시 403 또는 404가 반환될 수 있으며, v1 운영 기준은 404를 반환한다.
      security:
        - ExternalSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/FileIdParam"
      responses:
        "200":
          description: 파일 상태 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileStatusResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"

  /api/external/me:
    get:
      tags: [External Me]
      summary: 현재 로그인한 공개 사용자 조회
      operationId: getExternalMe
      security:
        - ExternalSessionAuth: []
      responses:
        "200":
          description: 내 정보 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalMeResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
    patch:
      tags: [External Me]
      summary: 내 정보 수정
      operationId: updateExternalMe
      security:
        - ExternalSessionAuth: []
          CsrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExternalMeUpdateRequest"
      responses:
        "200":
          description: 내 정보 수정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalMeResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"

  /api/external/me/download-history:
    get:
      tags: [External Me]
      summary: 내 다운로드 이력 조회
      operationId: getMyDownloadHistory
      security:
        - ExternalSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
      responses:
        "200":
          description: 다운로드 이력 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExternalDownloadHistoryListResponse"

        "400":
          $ref: "#/components/responses/BadRequestResponse"
  /api/internal/csrf:
    get:
      tags: [Internal CSRF]
      summary: 내부 그룹웨어 CSRF 토큰 발급
      operationId: getInternalCsrfToken
      responses:
        "200":
          description: CSRF 토큰 발급 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsrfTokenResponse"

        "400":
          $ref: "#/components/responses/BadRequestResponse"
  /api/internal/auth/login:
    post:
      tags: [Internal Auth]
      summary: 내부 사용자 로그인
      operationId: internalLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 로그인 성공
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalSessionResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "429":
          $ref: "#/components/responses/RateLimitResponse"

  /api/internal/auth/logout:
    post:
      tags: [Internal Auth]
      summary: 내부 사용자 로그아웃
      operationId: internalLogout
      security:
        - InternalSessionAuth: []
          CsrfHeader: []
      responses:
        "200":
          description: 로그아웃 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"

        "400":
          $ref: "#/components/responses/BadRequestResponse"
  /api/internal/auth/me:
    get:
      tags: [Internal Auth]
      summary: 현재 로그인한 내부 사용자 조회
      operationId: getInternalMe
      security:
        - InternalSessionAuth: []
      responses:
        "200":
          description: 사용자 정보 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalSessionResponse"

        "400":
          $ref: "#/components/responses/BadRequestResponse"
  /api/internal/notices:
    get:
      tags: [Internal Notices]
      summary: 사내 공지 목록 조회
      operationId: getInternalNotices
      security:
        - InternalSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
      responses:
        "200":
          description: 공지 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalNoticeListResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
    post:
      tags: [Internal Notices]
      summary: 사내 공지 생성
      operationId: createInternalNotice
      security:
        - InternalSessionAuth: []
          CsrfHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalNoticeCreateRequest"
      responses:
        "201":
          description: 공지 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalNoticeDetailResponse"

        "400":
          $ref: "#/components/responses/BadRequestResponse"
  /api/internal/notices/{noticeId}:
    get:
      tags: [Internal Notices]
      summary: 사내 공지 상세 조회
      operationId: getInternalNoticeDetail
      security:
        - InternalSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/NoticeIdParam"
      responses:
        "200":
          description: 공지 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalNoticeDetailResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
    patch:
      tags: [Internal Notices]
      summary: 사내 공지 수정
      operationId: updateInternalNotice
      security:
        - InternalSessionAuth: []
          CsrfHeader: []
      parameters:
        - $ref: "#/components/parameters/NoticeIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalNoticeUpdateRequest"
      responses:
        "200":
          description: 공지 수정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalNoticeDetailResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
    delete:
      tags: [Internal Notices]
      summary: 사내 공지 삭제
      operationId: deleteInternalNotice
      security:
        - InternalSessionAuth: []
          CsrfHeader: []
      parameters:
        - $ref: "#/components/parameters/NoticeIdParam"
      responses:
        "200":
          description: 공지 삭제 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseVoid"

        "400":
          $ref: "#/components/responses/BadRequestResponse"
  /api/internal/employees:
    get:
      tags: [Internal Employees]
      summary: 사원 디렉토리 조회
      operationId: getEmployees
      security:
        - InternalSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - $ref: "#/components/parameters/KeywordParam"
      responses:
        "200":
          description: 사원 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeListResponse"

        "400":
          $ref: "#/components/responses/BadRequestResponse"
  /api/internal/employees/{employeeId}:
    get:
      tags: [Internal Employees]
      summary: 사원 상세 조회
      operationId: getEmployeeDetail
      security:
        - InternalSessionAuth: []
      parameters:
        - $ref: "#/components/parameters/EmployeeIdParam"
      responses:
        "200":
          description: 사원 상세 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeDetailResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"

  /api/internal/approvals:
    get:
      tags: [Internal Approvals]
      summary: 전자결재 목록 조회
      operationId: getApprovals
      security:
        - InternalSessionAuth: []
